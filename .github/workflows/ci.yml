name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true # این خط باعث می‌شود پکیج‌ها کش شوند و بیلد سریع‌تر شود

      - name: Verify dependencies
        run: go mod verify

      - name: Run Tests
        run: make test || go test ./...

      - name: Build Binary
        run: make build || go build -o bin/books-api ./cmd/api/main.go

  docker-check:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t books-api:latest .

